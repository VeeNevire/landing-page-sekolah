name: Deploy Laravel InvestaSchool to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3 # SESUAIKAN VPS
          extensions: mbstring, intl, xml, zip, bcmath, pdo_mysql
          ini-values: memory_limit=2G

      - name: Cache Composer
        uses: actions/cache@v3
        with:
         path: ~/.composer/cache
         key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
         restore-keys: ${{ runner.os }}-composer-

      - name: ✅ Check platform requirements (fast failure)
        run: composer check-platform-reqs || true
        
      - name: 📦 Install Composer
        env:
          COMPOSER_ALLOW_SUPERUSER: 1
        run: composer install --no-progress --prefer-dist --no-dev --no-interaction --optimize-autoloader -o

      - name: 🚀 Deploy ke VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ${{ secrets.SERVER_PATH }}

            echo "Pull code"
            git pull origin main

            echo "Install composer"
            composer install --no-dev --optimize-autoloader

            echo "Load NVM"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22

            echo "Node version:"
            node -v

            echo "Install node modules"
            npm install

            echo "Build frontend"
            npm run build

            echo "Migrate"
            php artisan migrate --force

            echo "Clear cache & OPcache"
            php artisan optimize:clear
            
            echo "Cache ulang"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Permission"
            chmod -R 777 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache

            echo "Restart PHP & Nginx"
            sudo systemctl restart php8.3-fpm # SESUAIKAN
            sudo systemctl reload nginx

            echo "Restart Horizon"
            sudo supervisorctl restart horizon:*